services:
  - type: web
    name: ChikooMusic
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: LOGGER_ID
        sync: false
      - key: MONGO_URL
        sync: false
      - key: OWNER_ID
        sync: false
      - key: SESSION
        sync: false
      - key: QUEUE_LIMIT
        value: 50
      - key: DURATION_LIMIT
        value: 5400
      - key: PLAYLIST_LIMIT
        value: 20
